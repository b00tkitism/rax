# Build tuning for rax.
#
# x86-64-v3 (Haswell+, 2013+) is a portable baseline that still lets LLVM emit
# AVX2/BMI2/FMA/POPCNT/LZCNT and autovectorize the scalar SIMD/flag loops - the
# bulk of the codegen win - while staying runnable on any modern x86-64 host.
#
# For a local benchmark/throughput build on the machine you're sitting at, prefer
# the host's full ISA:  RUSTFLAGS="-C target-cpu=native" cargo build --release
[build]
rustflags = ["-C", "target-cpu=x86-64-v3"]
